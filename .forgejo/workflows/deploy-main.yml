name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrate:
        description: >
          Run remote D1 migrations before deploying.
          Set to "true" only when this deployment includes schema changes.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Production Deploy
    runs-on: deploy
    timeout-minutes: 45

    permissions:
      contents: read

    env:
      APP_NAME: "BeenSoberFor"
      CI: "true"
      FLEET_FORGEJO_BASE_URL: "https://code.platform.nard.uk"
      FLEET_FORGEJO_OWNER: "narduk-enterprises"
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      PACKAGE_REGISTRY_PROVIDER: "forgejo"
      NUXT_TELEMETRY_DISABLED: "1"
      SITE_URL: "https://www.beensoberfor.com"
      APP_BACKEND_PRESET: ${{ secrets.APP_BACKEND_PRESET }}
      AUTH_AUTHORITY_URL: ${{ secrets.AUTH_AUTHORITY_URL }}
      AUTH_BACKEND: ${{ secrets.AUTH_BACKEND }}
      AUTH_ENFORCE_CANONICAL_HOST: ${{ secrets.AUTH_ENFORCE_CANONICAL_HOST }}
      AUTH_PROVIDERS: ${{ secrets.AUTH_PROVIDERS }}
      AUTH_PUBLIC_SIGNUP: ${{ secrets.AUTH_PUBLIC_SIGNUP }}
      AUTH_REQUIRE_MFA: ${{ secrets.AUTH_REQUIRE_MFA }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SECRETS_KEYRING: ${{ secrets.SECRETS_KEYRING }}
      SECRETS_MASTER_KEY: ${{ secrets.SECRETS_MASTER_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_ANON_KEY: ${{ secrets.SUPABASE_AUTH_ANON_KEY }}
      SUPABASE_AUTH_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_AUTH_SERVICE_ROLE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
      GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
      POSTHOG_PUBLIC_KEY: ${{ secrets.POSTHOG_PUBLIC_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
      GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
      POSTHOG_DOMAIN: ${{ secrets.POSTHOG_DOMAIN }}
      POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
      MAPKIT_SERVER_API_KEY: ${{ secrets.MAPKIT_SERVER_API_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Validate deploy environment
        run: |
          set -euo pipefail

          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID FORGEJO_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing $key for deploy."
              exit 1
            fi
          done

          echo "Using repository-managed deploy secrets."
        working-directory: .

      - name: Configure package registry auth
        run: |
          node ./tools/configure-package-registry-auth.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=3072

      - name: Migrate (remote D1)
        if: ${{ inputs.run_migrate == 'true' }}
        working-directory: apps/web
        run: |
          set -euo pipefail
          cmd=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const value=(pkg.scripts?.['db:migrate'] || '').replaceAll('--local', '--remote'); process.stdout.write(value)")
          if [[ -z "$cmd" ]]; then
            echo "No db:migrate script found, skipping."
            exit 0
          fi
          bash -lc "$cmd"

      - name: Deploy
        working-directory: apps/web
        run: pnpm run deploy
